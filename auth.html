<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Messenger — Авторизация</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Основные стили в духе Telegram Web */
        body {
            background-color: #212121;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .auth-card {
            width: 100%;
            max-width: 360px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        .auth-logo img {
            width: 100px;
            height: 100px;
            margin-bottom: 25px;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 { font-size: 24px; font-weight: 600; margin-bottom: 10px; }
        .subtitle { color: #aaaaaa; font-size: 15px; margin-bottom: 30px; line-height: 1.4; }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            border: 1px solid #2f2f2f;
            border-radius: 12px;
            padding: 10px 15px;
            text-align: left;
            background: #212121;
            transition: border-color 0.2s;
        }

        .input-group:focus-within { border-color: #8774e1; }
        .input-group label { display: block; color: #8774e1; font-size: 12px; margin-bottom: 4px; font-weight: 600; }
        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }
        .input-group input::placeholder { color: #555; }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #8774e1;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .auth-btn:hover { background: #7a66cb; }
        .auth-btn:disabled { background: #555; cursor: not-allowed; }
        .auth-btn.secondary { background: transparent; border: 1px solid #2f2f2f; margin-top: 15px; }
        .auth-btn.secondary:hover { background: #2a2a2a; }
        
        .text-link { color: #8774e1; font-size: 14px; display: inline-block; margin-top: 20px; cursor: pointer; transition: opacity 0.2s; }
        .text-link:hover { opacity: 0.8; }
        .hidden { display: none !important; }

        #authCode {
            text-align: center;
            font-size: 24px;
            letter-spacing: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Aura Logo">
        </div>

        <div id="stepIdentify">
            <h1>Aura Messenger</h1>
            <p class="subtitle">Твой уголок безопасности.<br>Введи Username или E-mail</p>
            <div class="input-group">
                <label>Логин</label>
                <input type="text" id="loginInput" placeholder="username или e-mail">
            </div>
            <button class="auth-btn" id="btnIdentify" onclick="identifyUser()">ДАЛЕЕ</button>
            <button class="auth-btn secondary" onclick="showStep('stepProfile')">СОЗДАТЬ АККАУНТ</button>
        </div>

        <div id="stepChooseMethod" class="hidden">
            <h1>Способ входа</h1>
            <p class="subtitle" id="welcomeUserText">С возвращением!</p>
            <div id="methodsContainer">
                <button class="auth-btn" onclick="showStep('stepPasswordLogin')">ВОЙТИ ПО ПАРОЛЮ</button>
                <button class="auth-btn secondary hidden" id="btnMethodEmail" onclick="requestAuthCode('email')">ПОЛУЧИТЬ КОД НА E-MAIL</button>
                <button class="auth-btn secondary hidden" id="btnMethodTg" onclick="requestAuthCode('telegram')">ПОЛУЧИТЬ КОД В TELEGRAM</button>
            </div>
            <span class="text-link" onclick="showStep('stepIdentify')">Назад</span>
        </div>

        <div id="stepPasswordLogin" class="hidden">
            <h1>Пароль</h1>
            <p class="subtitle">Введите ваш пароль от аккаунта</p>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="loginPass" placeholder="••••••••">
            </div>
            <button class="auth-btn" id="btnLoginPass" onclick="loginWithPassword()">ВОЙТИ</button>
            <span class="text-link" onclick="showStep('stepChooseMethod')">Назад</span>
        </div>

        <div id="stepCode" class="hidden">
            <h1 id="codeTitle">Код подтверждения</h1>
            <p class="subtitle" id="codeSubtitle">Мы отправили код</p>
            <div class="input-group">
                <label>Код из сообщения</label>
                <input type="text" id="authCode" placeholder="----" maxlength="4">
            </div>
            <button class="auth-btn" id="btnVerify" onclick="verifyCode()">ПОДТВЕРДИТЬ</button>
            <span class="text-link" onclick="showStep('stepChooseMethod')">Отмена</span>
        </div>

        <div id="stepProfile" class="hidden">
            <h1>Регистрация</h1>
            <p class="subtitle">Добро пожаловать в Aura</p>
            <div class="input-group">
                <label>Ваше имя</label>
                <input type="text" id="regFullName" placeholder="Например: Иван Иванов">
            </div>
            <div class="input-group">
                <label>Username (обязательно)</label>
                <input type="text" id="regUsername" placeholder="nickname">
            </div>
            <div class="input-group">
                <label>E-mail (необязательно)</label>
                <input type="email" id="regEmail" placeholder="Для восстановления доступа">
            </div>
            <div class="input-group">
                <label>Придумайте пароль</label>
                <input type="password" id="regPass" placeholder="Минимум 6 символов">
            </div>
            <button class="auth-btn" id="btnRegister" onclick="finishRegistration()">НАЧАТЬ ОБЩЕНИЕ</button>
            <span class="text-link" onclick="showStep('stepIdentify')">Уже есть аккаунт? Войти</span>
        </div>
    </div>

    <script>
        let currentLoginId = ''; // То, что ввел юзер (почта или username)
        let identifiedUsername = ''; // Точный username, который вернул сервер
        let activeAuthMethod = ''; // 'email' или 'telegram'

        // Переключение экранов
        function showStep(stepId) {
            document.querySelectorAll('.auth-card > div').forEach(div => {
                if (!div.classList.contains('auth-logo')) div.classList.add('hidden');
            });
            const target = document.getElementById(stepId);
            if (target) target.classList.remove('hidden');
        }

        // 1. Проверка: существует ли пользователь и какие методы ему доступны
        async function identifyUser() {
            const loginInput = document.getElementById('loginInput').value.trim();
            if (!loginInput) return alert("Введите Username или E-mail!");

            const btn = document.getElementById('btnIdentify');
            btn.disabled = true;
            btn.innerText = "ПРОВЕРКА...";

            try {
                const response = await fetch('/api/check-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginId: loginInput })
                });
                const result = await response.json();

                if (response.ok && result.exists) {
                    currentLoginId = loginInput;
                    identifiedUsername = result.username;
                    
                    document.getElementById('welcomeUserText').innerText = `Аккаунт: @${result.username}`;
                    
                    // Показываем/скрываем кнопки в зависимости от привязок
                    const btnEmail = document.getElementById('btnMethodEmail');
                    const btnTg = document.getElementById('btnMethodTg');
                    
                    if (result.hasEmail) btnEmail.classList.remove('hidden');
                    else btnEmail.classList.add('hidden');

                    if (result.hasTelegram) btnTg.classList.remove('hidden');
                    else btnTg.classList.add('hidden');

                    showStep('stepChooseMethod');
                } else {
                    alert("Аккаунт не найден. Проверьте данные или создайте новый!");
                }
            } catch (e) {
                alert("Ошибка соединения с сервером");
            } finally {
                btn.disabled = false;
                btn.innerText = "ДАЛЕЕ";
            }
        }

        // 2. Запрос кода (на E-mail или Telegram)
        async function requestAuthCode(method) {
            activeAuthMethod = method;
            const btnId = method === 'email' ? 'btnMethodEmail' : 'btnMethodTg';
            const btn = document.getElementById(btnId);
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerText = "ОТПРАВКА...";

            try {
                const response = await fetch('/api/send-auth-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: identifiedUsername, method: method })
                });
                
                if (response.ok) {
                    document.getElementById('codeSubtitle').innerHTML = method === 'email' 
                        ? `Мы отправили код на ваш <b>E-mail</b>` 
                        : `Мы отправили код в ваш <b>Telegram</b>`;
                    
                    document.getElementById('authCode').value = ''; // очищаем поле
                    showStep('stepCode');
                } else {
                    const res = await response.json();
                    alert(res.error || "Ошибка при отправке кода");
                }
            } catch (e) {
                alert("Сервер не отвечает");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        // 3. Вход по паролю
        async function loginWithPassword() {
            const password = document.getElementById('loginPass').value;
            if (!password) return alert("Введите пароль");

            const btn = document.getElementById('btnLoginPass');
            btn.disabled = true;

            try {
                const response = await fetch('/api/login-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ loginId: currentLoginId, password })
                });
                const result = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('username', result.user.username);
                    window.location.href = "/index.html";
                } else {
                    alert(result.error || "Неверный пароль");
                }
            } catch (e) {
                alert("Ошибка сети");
            } finally {
                btn.disabled = false;
            }
        }

        // 4. Проверка кода (из почты или ТГ)
        async function verifyCode() {
            const code = document.getElementById('authCode').value.trim();
            if (code.length < 4) return alert("Введите 4 цифры");
            const btn = document.getElementById('btnVerify');
            btn.disabled = true;

            try {
                const response = await fetch('/api/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Теперь проверяем по юзернейму, а не по почте
                    body: JSON.stringify({ username: identifiedUsername, code: code }) 
                });
                const result = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('username', result.user.username);
                    window.location.href = "/index.html";
                } else {
                    alert(result.error || "Неверный код!");
                }
            } catch (e) {
                alert("Ошибка сервера");
            } finally {
                btn.disabled = false;
            }
        }

        // 5. Регистрация
        async function finishRegistration() {
            const name = document.getElementById('regFullName').value.trim();
            const user = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim(); // Необязательно
            const pass = document.getElementById('regPass').value;

            if (!name || !user || pass.length < 6) {
                return alert("Заполните Имя, Username и Пароль (минимум 6 символов)!");
            }
            if (user.includes(' ') || user.includes('@')) {
                return alert("Username не должен содержать пробелы и символ @");
            }

            const btn = document.getElementById('btnRegister');
            btn.disabled = true;
            btn.innerText = "СОЗДАНИЕ...";

            try {
                const response = await fetch('/api/register-final', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        fullname: name, 
                        username: user, 
                        email: email || null, // Отправляем null, если пусто
                        password: pass 
                    })
                });
                
                if (response.ok) {
                    localStorage.setItem('username', user);
                    window.location.href = "/index.html";
                } else {
                    const err = await response.json();
                    alert(err.error || "Ошибка регистрации");
                }
            } catch (e) {
                alert("Ошибка соединения");
            } finally {
                btn.disabled = false;
                btn.innerText = "НАЧАТЬ ОБЩЕНИЕ";
            }
        }
    </script>
</body>
</html>
